<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MasterMind VIP | Cyber Analytics</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { brand: '#0ea5e9', dark: '#030712', card: 'rgba(17, 24, 39, 0.7)' }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        .glass { @apply backdrop-blur-xl border border-white/5 dark:bg-card bg-white/80 shadow-2xl; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeInUp 0.4s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { @apply text-brand bg-brand/10 rounded-2xl; }
        .nav-item { @apply transition-all duration-300 flex flex-col items-center justify-center text-gray-400 p-3 cursor-pointer; }
        
        .user-initial { @apply w-20 h-20 rounded-3xl flex items-center justify-center text-3xl font-black text-white bg-gradient-to-br from-brand to-purple-600 shadow-lg shadow-brand/20; }
        
        ::-webkit-scrollbar { display: none; }

        #modal-bot {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: none;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }
        #modal-bot.active { display: flex; }
        
        #bot-host {
            flex: 1;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            background-color: #ffffff;
        }
        .dark #bot-host { background-color: #030712; }
        
        #bot-host iframe {
            width: 100% !important;
            height: 100% !important;
            border: none;
            display: block;
        }
    </style>
</head>
<body class="dark:bg-dark bg-slate-50 dark:text-white text-slate-900 min-h-screen pb-28">

    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 glass border-b border-white/5 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-brand rounded-lg flex items-center justify-center shadow-lg"><i class="fas fa-microchip text-white text-xs"></i></div>
            <span class="font-black text-lg tracking-tighter uppercase">MasterMind <span class="text-brand">VIP</span></span>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="toggleTheme()" class="w-9 h-9 rounded-full glass flex items-center justify-center text-slate-900 dark:text-white">
                <i id="theme-icon" class="fas fa-moon"></i>
            </button>
            <div id="auth-box">
                <button onclick="showLogin()" class="text-[10px] font-black px-4 py-2 border border-brand/40 rounded-full">LOG IN</button>
            </div>
            <div id="user-top" class="hidden" onclick="changeTab('profile', document.getElementById('btn-profile'))">
                <div id="top-initial" class="w-9 h-9 rounded-full bg-brand flex items-center justify-center font-bold text-sm text-white cursor-pointer"></div>
            </div>
        </div>
    </nav>

    <!-- Main View -->
    <div id="main-view" class="hidden pt-24 px-4 max-w-5xl mx-auto">
        
        <!-- HOME TAB -->
        <div id="tab-home" class="tab-content active">
            <!-- Trial Banner -->
            <div id="trial-alert" class="hidden mb-6 p-4 glass rounded-3xl border-brand/20 bg-brand/5 flex items-center justify-between">
                <div>
                    <h5 class="text-brand font-black text-[10px] uppercase tracking-widest">Active Trial</h5>
                    <p id="trial-days" class="text-xs text-slate-600 dark:text-gray-400 font-bold mt-1"></p>
                </div>
                <i class="fas fa-bolt text-brand animate-bounce"></i>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                <div class="md:col-span-2 glass p-6 rounded-[32px]">
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Global Analytics</h4>
                        <span class="text-green-500 text-xs font-bold animate-pulse">● LIVE</span>
                    </div>
                    <canvas id="performanceChart" height="150"></canvas>
                </div>
                <!-- accuracy Rate Box -->
                <div class="glass p-6 rounded-[32px] flex flex-col justify-center items-center relative">
                    <p class="text-[10px] font-bold text-gray-500 uppercase mb-4">Live Accuracy Rate</p>
                    <canvas id="accuracyDonut"></canvas>
                    <div id="accuracy-text" class="absolute mt-6 font-black text-brand text-xl">70%</div>
                </div>
            </div>

            <div class="glass p-6 rounded-[32px]">
                <h4 class="font-black text-[10px] text-gray-500 uppercase tracking-widest mb-4">Neural Feed</h4>
                <div id="live-logs" class="space-y-3"></div>
            </div>
        </div>

        <!-- BOTS TAB -->
        <div id="tab-bots" class="tab-content">
            <h2 class="text-2xl font-black mb-8 px-2 tracking-tighter">AI <span class="text-brand">Terminals</span></h2>
            <div id="bot-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-6"></div>
        </div>

        <!-- PROFILE TAB -->
        <div id="tab-profile" class="tab-content">
            <div class="max-w-xl mx-auto space-y-6">
                <div class="glass p-8 rounded-[40px] text-center border-t-4 border-brand">
                    <h4 class="text-xs font-black text-gray-500 uppercase tracking-widest mb-6">Security Hub</h4>
                    <div id="verify-none">
                        <p class="text-xs text-gray-400 mb-6 px-4 leading-relaxed">Submit your broker UID to unlock Permanent VIP access.</p>
                        <div class="flex flex-col gap-3">
                            <a href="https://broker-qx.pro/sign-up/?lid=1179964" target="_blank" class="w-full py-4 glass bg-slate-100 dark:bg-white/5 rounded-2xl font-black text-[10px] tracking-widest uppercase">1. Register Account</a>
                            <div class="flex gap-2">
                                <input id="uid-field" type="text" placeholder="UID" class="bg-black/5 dark:bg-black/20 border border-black/10 dark:border-white/5 px-6 rounded-2xl flex-1 text-sm outline-none focus:border-brand">
                                <button onclick="handleUIDSubmit()" class="bg-brand text-white px-8 py-4 rounded-2xl font-black text-[10px] tracking-widest uppercase">Verify</button>
                            </div>
                        </div>
                    </div>
                    <div id="verify-pending" class="hidden py-6"><div class="w-14 h-14 border-4 border-brand/20 border-t-brand rounded-full animate-spin mx-auto mb-4"></div><h5 class="text-brand font-black text-lg tracking-tight uppercase">Processing UID...</h5></div>
                    <div id="verify-approved" class="hidden py-6"><i class="fas fa-check-double text-green-500 text-6xl mb-4"></i><h5 class="text-green-500 font-black text-2xl tracking-tighter uppercase">Permanent VIP</h5></div>
                </div>

                <div class="glass p-8 rounded-[40px]">
                    <div class="flex items-center gap-6 mb-10">
                        <div id="profile-avatar" class="user-initial"></div>
                        <div><h3 id="profile-name" class="text-2xl font-black tracking-tight"></h3><span class="text-[9px] font-black tracking-widest uppercase text-brand">Secure Account</span></div>
                    </div>
                    <div class="glass p-4 rounded-2xl flex justify-between items-center font-bold text-sm"><span id="u-email"></span><i class="fas fa-shield-alt text-brand"></i></div>
                </div>
                <button onclick="logout()" class="w-full py-4 bg-red-500/10 text-red-500 rounded-2xl font-black text-[10px] uppercase hover:bg-red-500 hover:text-white transition-all">Sign Out</button>
            </div>
        </div>
    </div>

    <!-- Mobile Nav -->
    <div id="nav-bar" class="hidden fixed bottom-6 left-6 right-6 z-[60] glass rounded-[32px] p-2 flex justify-between shadow-2xl">
        <button onclick="changeTab('home', this)" class="nav-item active flex-1"><i class="fas fa-chart-pie"></i><span class="text-[8px] font-bold mt-1 uppercase">Home</span></button>
        <button onclick="changeTab('bots', this)" class="nav-item flex-1"><i class="fas fa-microchip"></i><span class="text-[8px] font-bold mt-1 uppercase">Bots</span></button>
        <button id="btn-profile" onclick="changeTab('profile', this)" class="nav-item flex-1"><i class="fas fa-user-shield"></i><span class="text-[8px] font-bold mt-1 uppercase">Profile</span></button>
    </div>

    <!-- BOT MODAL -->
    <div id="modal-bot">
        <div class="p-4 border-b border-black/5 dark:border-white/5 flex justify-between items-center bg-white dark:bg-dark text-slate-900 dark:text-white">
            <h3 id="bot-name-head" class="text-brand font-black uppercase text-[10px] tracking-widest"></h3>
            <button onclick="closeBot()" class="w-10 h-10 rounded-full hover:bg-black/5 dark:hover:bg-white/5 text-xl flex items-center justify-center transition-all">&times;</button>
        </div>
        <div id="bot-host"></div>
    </div>

    <!-- GUEST UI -->
    <div id="guest-ui" class="pt-48 px-6 text-center max-w-3xl mx-auto">
        <h1 class="text-6xl md:text-8xl font-black tracking-tighter mb-8 leading-[0.85]">AI TRADING <br><span class="text-brand">VIP PORTAL.</span></h1>
        <button onclick="showSignup()" class="bg-brand text-white px-12 py-4 rounded-2xl font-black text-sm shadow-xl shadow-brand/30 uppercase tracking-widest">Start Free Trial</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQ6nvXMsMbCjS68rL5AMxVLvu250w89g4",
            authDomain: "mastarmind-bfdef.firebaseapp.com",
            projectId: "mastarmind-bfdef",
            storageBucket: "mastarmind-bfdef.firebasestorage.app",
            messagingSenderId: "198077710039",
            appId: "1:198077710039:web:328732d344d1f803a37a92"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let accuracyChartInst = null;

        function getDeviceId() {
            let id = localStorage.getItem('mm_device_v4');
            if(!id) {
                id = 'dev-' + Math.random().toString(36).substr(2, 9) + '-' + Date.now();
                localStorage.setItem('mm_device_v4', id);
            }
            return id;
        }

        async function showLogin() {
            const { value: f } = await Swal.fire({
                title: 'LOGIN', background: document.documentElement.classList.contains('dark') ? '#030712' : '#fff', color: document.documentElement.classList.contains('dark') ? '#fff' : '#000',
                html: `<div class="flex flex-col gap-4 p-2"><input id="l-email" class="swal2-input !m-0 !w-full bg-transparent border-black/10 dark:border-white/10 rounded-xl" placeholder="Email"><input id="l-pass" type="password" class="swal2-input !m-0 !w-full bg-transparent border-black/10 dark:border-white/10 rounded-xl" placeholder="Password"></div>`,
                confirmButtonText: 'LOG IN', customClass: { confirmButton: 'bg-brand !px-10 !py-3 rounded-xl' }
            });
            if(f) {
                try { await auth.signInWithEmailAndPassword(document.getElementById('l-email').value, document.getElementById('l-pass').value); }
                catch(e) { Swal.fire('Error', 'Login Failed', 'error'); }
            }
        }

        async function showSignup() {
            const { value: f } = await Swal.fire({
                title: 'JOIN VIP', background: document.documentElement.classList.contains('dark') ? '#030712' : '#fff', color: document.documentElement.classList.contains('dark') ? '#fff' : '#000',
                html: `<div class="flex flex-col gap-3 p-2"><input id="s-name" class="swal2-input !m-0 !w-full bg-transparent border-black/10 dark:border-white/10 rounded-xl" placeholder="Full Name"><input id="s-email" class="swal2-input !m-0 !w-full bg-transparent border-black/10 dark:border-white/10 rounded-xl" placeholder="Email"><input id="s-pass" type="password" class="swal2-input !m-0 !w-full bg-transparent border-black/10 dark:border-white/10 rounded-xl" placeholder="Password"></div>`,
                confirmButtonText: 'REGISTER', customClass: { confirmButton: 'bg-brand !px-10 !py-3 rounded-xl' }
            });
            if(f) {
                const n = document.getElementById('s-name').value, e = document.getElementById('s-email').value, p = document.getElementById('s-pass').value, dId = getDeviceId();
                try {
                    const devCheck = await db.collection("users").where("deviceId", "==", dId).get();
                    if(!devCheck.empty) return Swal.fire('Denied', 'This device already has an account.', 'error');
                    const r = await auth.createUserWithEmailAndPassword(e, p);
                    const trialExp = new Date(); trialExp.setDate(trialExp.getDate() + 3);
                    await db.collection("users").doc(r.user.uid).set({ name: n, email: e, password: p, uidStatus: 'none', deviceId: dId, trialExpiry: trialExp });
                } catch(err) { Swal.fire('Error', err.message, 'error'); }
            }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('guest-ui').classList.add('hidden');
                document.getElementById('main-view').classList.remove('hidden');
                document.getElementById('nav-bar').classList.remove('hidden');
                document.getElementById('user-top').classList.remove('hidden');
                document.getElementById('auth-box').classList.add('hidden');
                db.collection("users").doc(user.uid).onSnapshot(doc => { if(doc.exists) { currentUser = doc.data(); syncProfile(currentUser); } });
                initCharts();
            } else {
                document.getElementById('guest-ui').classList.remove('hidden');
                document.getElementById('main-view').classList.add('hidden');
                document.getElementById('nav-bar').classList.add('hidden');
                document.getElementById('user-top').classList.add('hidden');
                document.getElementById('auth-box').classList.remove('hidden');
            }
        });

        function syncProfile(data) {
            document.getElementById('top-initial').innerText = data.name[0].toUpperCase();
            document.getElementById('profile-avatar').innerText = data.name[0].toUpperCase();
            document.getElementById('profile-name').innerText = data.name;
            document.getElementById('u-email').innerText = data.email;

            const now = new Date(), exp = data.trialExpiry.toDate();
            if(exp > now && data.uidStatus !== 'approved') {
                document.getElementById('trial-alert').classList.remove('hidden');
                const hours = Math.floor((exp - now) / (1000*60*60));
                document.getElementById('trial-days').innerText = `Free Trial Active: ${hours} hours left.`;
            } else { document.getElementById('trial-alert').classList.add('hidden'); }

            const vn = document.getElementById('verify-none'), vp = document.getElementById('verify-pending'), va = document.getElementById('verify-approved');
            vn.classList.add('hidden'); vp.classList.add('hidden'); va.classList.add('hidden');
            if(data.uidStatus === 'approved') va.classList.remove('hidden');
            else if(data.uidStatus === 'pending') vp.classList.remove('hidden');
            else vn.classList.remove('hidden');
            loadBots();
        }

        function loadBots() {
            db.collection("bots").onSnapshot(snap => {
                const g = document.getElementById('bot-grid'); g.innerHTML = '';
                snap.forEach(doc => {
                    const b = doc.data();
                    g.innerHTML += `
                    <div class="glass p-5 rounded-[32px] group relative overflow-hidden">
                        ${b.vip ? '<div class="absolute top-4 right-4 bg-brand text-white text-[8px] font-black px-2 py-1 rounded-full z-10">VIP</div>' : ''}
                        <img src="${b.image}" class="bot-img mb-4">
                        <h4 class="font-bold text-sm mb-1">${b.name}</h4>
                        <button onclick="runBot('${doc.id}', ${b.vip})" class="w-full py-4 bg-brand text-white rounded-2xl text-[10px] font-black uppercase mt-4">Launch AI</button>
                    </div>`;
                });
            });
        }

        async function runBot(id, isVIP) {
            const now = new Date(), exp = currentUser.trialExpiry.toDate();
            const hasAccess = (currentUser.uidStatus === 'approved') || (exp > now);
            if(isVIP && !hasAccess) return Swal.fire('Denied', 'Your trial expired. Submit UID to continue.', 'warning');
            
            const b = await db.collection("bots").doc(id).get(), botData = b.data();
            document.getElementById('bot-name-head').innerText = botData.name;
            const host = document.getElementById('bot-host');
            host.innerHTML = ''; 

            const iframe = document.createElement('iframe');
            iframe.setAttribute('sandbox', 'allow-forms allow-modals allow-popups allow-presentation allow-same-origin allow-scripts');
            iframe.setAttribute('allow', 'geolocation; microphone; camera; midi; vr; accelerometer; gyroscope; payment; ambient-light-sensor; encrypted-media; usb');
            host.appendChild(iframe);

            const iframeDoc = iframe.contentWindow.document;
            iframeDoc.open();
            iframeDoc.write(`<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>body { margin: 0; padding: 0; background: ${document.documentElement.classList.contains('dark') ? '#030712' : '#ffffff'}; color: ${document.documentElement.classList.contains('dark') ? '#fff' : '#000'}; }</style></head><body>${botData.htmlCode}</body></html>`);
            iframeDoc.close();

            document.getElementById('modal-bot').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeBot() { 
            document.getElementById('bot-host').innerHTML = ''; 
            document.getElementById('modal-bot').classList.remove('active'); 
            document.body.style.overflow = 'auto';
        }

        async function handleUIDSubmit() {
            const uid = document.getElementById('uid-field').value;
            if(!uid) return;
            await db.collection("users").doc(auth.currentUser.uid).update({ submittedUID: uid, uidStatus: 'pending' });
            Swal.fire('Success', 'UID sent for verification.', 'success');
        }

        function changeTab(tab, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            document.getElementById('theme-icon').className = isDark ? 'fas fa-moon' : 'fas fa-sun';
            if(accuracyChartInst) accuracyChartInst.update();
        }

        function initCharts() {
            const ctx1 = document.getElementById('performanceChart');
            if(ctx1) new Chart(ctx1, { type: 'line', data: { labels: ['M', 'T', 'W', 'T', 'F', 'S'], datasets: [{ data: [85, 92, 88, 96, 91, 98], borderColor: '#0ea5e9', tension: 0.4, fill: true, backgroundColor: 'rgba(14, 165, 233, 0.1)' }] }, options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } } });
            
            const ctx2 = document.getElementById('accuracyDonut');
            if(ctx2 && !accuracyChartInst) {
                accuracyChartInst = new Chart(ctx2, { 
                    type: 'doughnut', 
                    data: { 
                        labels: ['Win', 'Loss'], 
                        datasets: [{ 
                            data: [70, 30], 
                            backgroundColor: ['#0ea5e9', '#ef4444'], 
                            borderWidth: 0 
                        }] 
                    }, 
                    options: { 
                        plugins: { legend: { display: false } },
                        cutout: '80%',
                        animation: { duration: 1500 }
                    } 
                });
            }
        }

        // accuracy Update Logic
        setInterval(() => {
            if(accuracyChartInst) {
                // Generate a random Win Rate between 68 and 75
                const winRate = Math.floor(Math.random() * (75 - 68 + 1)) + 68;
                const lossRate = 100 - winRate;
                
                accuracyChartInst.data.datasets[0].data = [winRate, lossRate];
                accuracyChartInst.update();
                
                const textEl = document.getElementById('accuracy-text');
                if(textEl) textEl.innerText = winRate + "%";
            }
        }, 5000);

        function logout() { auth.signOut(); location.reload(); }

        setInterval(() => {
            const feed = ["EUR/USD Signal Confirmed", "BTC Profit Target Hit", "VIP Bot updated", "Neural link synchronized"];
            const div = document.createElement('div');
            div.className = "flex justify-between items-center text-[10px] glass p-3 rounded-xl";
            div.innerHTML = `<span>${feed[Math.floor(Math.random()*feed.length)]}</span> <span class="text-brand">Active</span>`;
            const box = document.getElementById('live-logs');
            if(box) { box.prepend(div); if(box.children.length > 3) box.lastChild.remove(); }
        }, 4000);
    </script>
</body>
</html>
